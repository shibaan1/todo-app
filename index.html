<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO APP</title>
</head>

<body>
    <h1>TODO APP</h1>
    <div class="inputscreen">

        <input id='input' type="text">
        <button id="addtask">Add Task</button>
    </div>

    <div id="counter">
        <span id="taskcompleted">X</span>Task compeleted out of <span id="totaltask">Y</span>
    </div>

    <div class="taskscreen">
        <ul id="tasklist">

        </ul>
        <button id="btn1" data-filter="all">All Task</button>
        <button id="btn2" data-filter="active">Active Task</button>
        <button id="btn3" data-filter="completed">Completed Task</button>

        <button id="clear">Clear All Task</button>
    </div>

</body>

</html>
